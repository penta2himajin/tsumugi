name: Auto-retrain SetFit on PR input change

# Whenever a PR touches the SetFit training inputs (`queries.jsonl` or
# `scripts/train_setfit.py`), re-train the encoder + head and push the
# regenerated artifacts back to the PR branch as an additional commit.
#
# Sibling to `.github/workflows/train_setfit.yml`:
#
#   - `train_setfit.yml`       — `workflow_dispatch:` only, opens a new
#                                 PR with the artifacts (used for the
#                                 initial ONNX commit when the file
#                                 isn't in LFS yet).
#   - `train_setfit_pr.yml`    — this file, `pull_request:` triggered
#                                 by input changes, pushes a follow-up
#                                 commit to the same PR branch.
#
# Caveats:
#   - PRs from forks have a read-only `GITHUB_TOKEN`, so we skip them.
#     Same-repo PRs (which is most of them for this project) work.
#   - Pushes made by `secrets.GITHUB_TOKEN` don't trigger downstream
#     workflows (`bench.yml` / `ci.yml`). For our path filter this is
#     fine — `bench.yml` doesn't watch `models/setfit/`, so even if
#     downstream re-triggering worked it'd be a no-op for retrieval
#     metrics.
#   - If training reproduces bit-identical outputs (the contributor
#     already ran `scripts/train_setfit.py` locally and committed the
#     artifacts), the diff check short-circuits and no extra commit
#     is pushed.
#   - Bot commits land in `models/setfit/`, which is NOT in the path
#     filter below, so the bot's push doesn't re-trigger this workflow
#     in a loop.

on:
  pull_request:
    paths:
      - 'models/setfit-training/queries.jsonl'
      - 'scripts/train_setfit.py'

permissions:
  contents: write   # for pushing the regenerated artifacts to PR branch

jobs:
  retrain:
    name: retrain + push to PR branch
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip fork PRs — they can't be pushed to with GITHUB_TOKEN.
    if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR's head branch directly so the bot's commit
          # lands on it, not on the GitHub-generated merge commit.
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          # Pull existing LFS-tracked artifacts so the diff check below
          # compares real bytes, not pointers.
          lfs: true
          fetch-depth: 0
          # Default token has `contents: write` per the permissions block
          # above. Sufficient for same-repo branch pushes.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: train-setfit-pip-${{ hashFiles('scripts/train_setfit.py') }}

      - name: Install pinned training deps
        # Same pin set as `train_setfit.yml` and
        # `models/setfit-training/README.md`. Setfit 1.1.0 needs the
        # older transformers / sentence-transformers / datasets;
        # newer onnxruntime references torch.int4 which torch 2.4.1
        # doesn't have.
        run: |
          pip install --upgrade pip
          pip install \
            "setfit==1.1.0" \
            "transformers==4.45.2" \
            "sentence-transformers==3.2.1" \
            "datasets==2.21.0" \
            "optimum[onnxruntime]==1.23.3" \
            "onnxruntime==1.20.1" \
            "torch==2.4.1"

      - name: Run training
        run: python3 scripts/train_setfit.py

      - name: Verify training output
        run: |
          test -e models/setfit/all-MiniLM-L6-v2-default.onnx
          test -e models/setfit/all-MiniLM-L6-v2-default.head.json
          test -e models/setfit/all-MiniLM-L6-v2-default.tokenizer.json
          ls -la models/setfit/

      - name: Push regenerated artifacts if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add models/setfit/all-MiniLM-L6-v2-default.onnx
          git add models/setfit/all-MiniLM-L6-v2-default.head.json
          git add models/setfit/all-MiniLM-L6-v2-default.tokenizer.json
          if git diff --cached --quiet; then
            echo "Outputs already match the staged training inputs — no commit needed."
            exit 0
          fi
          # Compose the commit message via heredoc so the multi-line
          # body doesn't trip up YAML block-scalar parsing.
          cat > /tmp/commit-msg <<MSG_EOF
          chore(setfit): regenerate ONNX + head + tokenizer (auto)

          Auto-generated by .github/workflows/train_setfit_pr.yml
          run ${{ github.run_id }} after a change to the SetFit training
          inputs in this PR. Re-runs scripts/train_setfit.py with the
          pinned dependency set and pushes the regenerated artifacts
          back onto the PR branch so reviewers see the updated head /
          tokenizer / encoder ONNX in the same diff.

          If the contributor already trained locally and committed
          identical outputs, this commit doesn't appear (the diff check
          short-circuits). To skip the auto-commit explicitly, train
          locally and push the result before opening the PR.
          MSG_EOF
          git commit --file=/tmp/commit-msg
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
