name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    name: cargo test (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - "default"
          - "creative"
          - "network"
          - "sqlite"
          - "all-features"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: |
          case "${{ matrix.features }}" in
            default) cargo clippy --workspace --all-targets ;;
            all-features) cargo clippy --workspace --all-features --all-targets ;;
            *) cargo clippy --workspace --features "${{ matrix.features }}" --all-targets ;;
          esac
      - name: cargo test
        run: |
          case "${{ matrix.features }}" in
            default) cargo test --workspace ;;
            all-features) cargo test --workspace --all-features ;;
            *) cargo test --workspace --features "${{ matrix.features }}" ;;
          esac

  tsumugi-ts:
    name: tsumugi-ts (typecheck + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: bun install
        working-directory: tsumugi-ts
        run: bun install --frozen-lockfile
      - name: typecheck
        working-directory: tsumugi-ts
        run: bun run typecheck
      - name: vitest
        working-directory: tsumugi-ts
        run: bun run test

  drift-check:
    name: Alloy model drift check (oxidtr regen)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: tsumugi
      - uses: actions/checkout@v4
        with:
          repository: penta2himajin/oxidtr
          path: oxidtr
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            oxidtr
            tsumugi
      - name: Install tsumugi-ts deps
        working-directory: tsumugi/tsumugi-ts
        run: bun install --frozen-lockfile
      - name: Regenerate gen/ (Rust + TS) via oxidtr
        working-directory: tsumugi
        run: OXIDTR_HOME=${{ github.workspace }}/oxidtr ./scripts/regen.sh
      - name: Diff committed gen/ against regeneration
        working-directory: tsumugi
        run: |
          if ! git diff --exit-code tsumugi-core/src/gen/ tsumugi-ts/src/gen/; then
            echo "::error::gen/ is out of sync with models/. Run scripts/regen.sh locally and commit the result."
            exit 1
          fi
