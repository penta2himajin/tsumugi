name: Bench

# tsumugi の encoder-only ベンチ。
#
# 構成:
# - **PR**: `cr` suite × `tier-0-1-2` ablation で固定実行 (~5 min)。`main`
#   の最後の bench snapshot とのレグレッション比較。snapshot に PASS で
#   記録された case が PR で FAIL に転じたら job を fail させる。
# - **push to main**: 同じ bench を実行し、結果を snapshot として cache
#   に保存。次回以降の PR がこの snapshot を比較対象にする。
# - **workflow_dispatch**: 手動。`all` suite (smoke + oracle + cr の 43
#   ケース) を全 ablation で回す。唯一の knob は `ablations` で、デフォルト
#   は 3 構成すべて (~25-30 min)。tier 部分集合だけ見たい時は CSV で絞れる。
#
# 設計指針: PR では「変更が壊していないか」だけを最短で見るため scope を
# 固定し、dispatch は「全体ベースラインを取り直す」用途に専念する。
# suite 切替や per_type 等の細かい knob は廃止し、ablation だけを唯一の
# 可変軸として残した (元々あった `--suite` / `LONGMEMEVAL_PER_TYPE` 等の
# CLI/env は runner 側に残っているので、CI を経由しない手動実行では引き
# 続き使える)。
#
# LLM 関連の step (llama.cpp install / start / health / Qwen GGUF
# download) は LLM 削除と共に廃止。`Suite::Health` と `Ablation::Full`
# は同時に削除されたので runner 側でも参照されない。
#
# 詳細は docs/ci-benchmark-integration-plan.md。

on:
  workflow_dispatch:
    inputs:
      ablations:
        description: 'Tier ablation set CSV (tier-0|tier-0-1|tier-0-1-2)'
        required: false
        type: string
        default: 'tier-0,tier-0-1,tier-0-1-2'
  pull_request:
    paths:
      - 'tsumugi-core/**'
      - 'benches/**'
      - '.github/workflows/bench.yml'
  push:
    branches: [main]
    paths:
      - 'tsumugi-core/**'
      - 'benches/**'
      - '.github/workflows/bench.yml'

permissions:
  contents: read

jobs:
  bench:
    name: bench
    runs-on: ubuntu-latest
    # PR は cr × tier-0-1-2 で ~5 min、dispatch の all × 3 ablations で
    # も 30 min 程度なので timeout 30 min。
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Cache Hugging Face hub
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-bench-v2-e5-${{ hashFiles('benches/scripts/download_models.sh') }}

      - name: Cache LLMLingua-2 ONNX export
        # mBERT-base 110M の DL + ONNX export は ~90 sec、export 結果を
        # cache すれば再 run は instant。`download_llmlingua2.sh` の
        # hash を key に含めて script を変えると bust する。
        uses: actions/cache@v4
        with:
          path: ~/.cache/tsumugi/llmlingua2-mbert
          key: llmlingua2-v1-${{ hashFiles('benches/scripts/download_llmlingua2.sh') }}

      - name: Cache DistilBART ONNX export
        # encoder + decoder + decoder_with_past の 3 graph export は
        # ~120 sec、cache 命中時 instant。bench runner は現状
        # `Summarizer` を消費していないので workflow_dispatch でのみ export 実行。
        uses: actions/cache@v4
        with:
          path: ~/.cache/tsumugi/distilbart-cnn-6-6
          key: distilbart-v1-${{ hashFiles('benches/scripts/download_distilbart.sh') }}

      - name: Determine effective inputs
        # PR/push は scope 固定、dispatch は ablations だけ受け取って残りは
        # ハードコード。suite 切替・per_type・seq_lengths の knob は廃止
        # 済 (頭の comment 参照)。`lme_per_type` / `ruler_seq` は dispatch
        # の `all` でしか参照されないが、env 名は runner 側で再利用される
        # ので両 path で出力しておく。
        id: cfg
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # 手動 dispatch: 全 suite (smoke + oracle + cr) × 指定 ablations。
            echo "suite=all" >> "$GITHUB_OUTPUT"
            echo "ablations=${{ inputs.ablations }}" >> "$GITHUB_OUTPUT"
            # oracle は 6 question_type × 5 問 = 30 問の full 母集団で
            # statistical power を確保する。
            echo "lme_per_type=5" >> "$GITHUB_OUTPUT"
            echo "ruler_seq=2048,4096,8192,12288" >> "$GITHUB_OUTPUT"
          else
            # PR / push to main: cr × tier-0-1-2 固定 (snapshot regression
            # check の母集団)。tier-0-1-2 は OnnxEmbedding + LlmLingua2
            # の両方を経由する最重 path で、breakage がここで検出できる。
            # cr は LongMemEval / RULER を消費しないので lme_per_type /
            # ruler_seq の値はどちらも実際には使われない (互換用に出力)。
            echo "suite=cr" >> "$GITHUB_OUTPUT"
            echo "ablations=tier-0-1-2" >> "$GITHUB_OUTPUT"
            echo "lme_per_type=1" >> "$GITHUB_OUTPUT"
            echo "ruler_seq=2048,4096,8192,12288" >> "$GITHUB_OUTPUT"
          fi

      - name: Download embedding model (multilingual-e5-small ONNX)
        run: ./benches/scripts/download_models.sh

      - name: Download datasets
        if: steps.cfg.outputs.suite == 'oracle' || steps.cfg.outputs.suite == 'cr' || steps.cfg.outputs.suite == 'all'
        run: ./benches/scripts/download_datasets.sh

      - name: Resolve multilingual-e5-small paths
        # HF cache から e5-small の ONNX / tokenizer ファイルパスを
        # `$GITHUB_ENV` に流し込む。bench runner は `TSUMUGI_E5_*` env が
        # 両方設定されていれば tier-0-1 を OnnxEmbedding に切り替える。
        run: ./benches/scripts/resolve_e5_paths.sh >> "$GITHUB_ENV"

      - name: Export + resolve LLMLingua-2 mBERT paths
        # tier-0-1-2 を含む実行でのみ必要。
        if: contains(steps.cfg.outputs.ablations, 'tier-0-1-2')
        run: ./benches/scripts/download_llmlingua2.sh >> "$GITHUB_ENV"

      - name: Export + resolve DistilBART paths
        # bench runner は現状 `Summarizer` を消費していないが、
        # workflow_dispatch では export を回して cache 効果を維持する。
        if: github.event_name == 'workflow_dispatch'
        run: ./benches/scripts/download_distilbart.sh >> "$GITHUB_ENV"

      - name: Build runner with onnx feature
        run: cargo build --release -p tsumugi-bench --features onnx

      - name: Restore baseline snapshot
        # PR / push 双方で main の snapshot を復元する。PR は比較に使う、
        # main push は cache hit で skip 判定にだけ参照する。
        # restore-keys の prefix 一致で main 系最新 sha の snapshot を拾う。
        # cache が無い場合 (初回 main push 前) は何も起こらず空のまま。
        if: github.event_name != 'workflow_dispatch'
        uses: actions/cache/restore@v4
        with:
          path: .bench-snapshot/
          key: bench-snapshot-main-${{ github.sha }}-never-matches
          restore-keys: |
            bench-snapshot-main-

      - name: Run bench
        env:
          LONGMEMEVAL_PATH: ${{ github.workspace }}/benches/data/longmemeval_oracle
          LONGMEMEVAL_PER_TYPE: ${{ steps.cfg.outputs.lme_per_type }}
          RULER_SEQ_LENGTHS: ${{ steps.cfg.outputs.ruler_seq }}
          MAB_CR_PATH: ${{ github.workspace }}/benches/data/memoryagentbench_cr.jsonl
          BENCH_ABLATIONS: ${{ steps.cfg.outputs.ablations }}
        run: |
          mkdir -p benches/results/${{ github.run_id }}
          ./target/release/tsumugi-bench \
            --suite ${{ steps.cfg.outputs.suite }} \
            --ablations "${{ steps.cfg.outputs.ablations }}" \
            --output benches/results/${{ github.run_id }}

      - name: Compare snapshot
        # PR では必須 (regression なら fail)、push to main では情報目的のみ
        # (true → main にマージ済の悪化を発見、log だけ出して continue)。
        if: github.event_name == 'pull_request'
        run: |
          ./benches/scripts/compare_snapshot.sh \
            .bench-snapshot/summary.json \
            benches/results/${{ github.run_id }}/summary.json

      - name: Save snapshot
        # main push でのみ snapshot を更新。これが次回 PR の比較対象になる。
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p .bench-snapshot
          cp benches/results/${{ github.run_id }}/summary.json .bench-snapshot/summary.json

      - name: Save snapshot cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: .bench-snapshot/
          key: bench-snapshot-main-${{ github.sha }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ steps.cfg.outputs.suite }}-${{ github.run_id }}
          path: benches/results/
          retention-days: 30
