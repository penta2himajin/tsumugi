name: Bench (Phase 4-α)

# Phase 4-α:
#   Step 1 v0 smoke (health): LLM 起動健全性 + 生成速度 + 簡易指示追従
#   Step 2 (oracle): LongMemEval_oracle 30 問 (層化抽出、規則ベース primary)
#   Step 3 PR ① (smoke): RULER NIAH-S 4 ケース (合成、Tier 0 baseline)
#   Step 3 PR ② (cr): MemoryAgentBench Conflict_Resolution 8 ケース
#                       (BM25 retrieval で context 圧縮、supersession 検証)
#
# - schedule (nightly) は **未設定**。Step 1 smoke が安定するまでは
#   workflow_dispatch のみで起動する (計画書方針通り、PR では走らない)。
# - 既存 .github/workflows/ci.yml には一切手を入れない。
#
# 詳細は docs/ci-benchmark-integration-plan.md。

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Benchmark suite'
        required: true
        type: choice
        options:
          - health
          - oracle
          - smoke
          - cr
          - all
        default: health
      llama_cpp_tag:
        description: 'llama.cpp release tag (default: latest)'
        required: false
        type: string
        default: latest
      qwen_revision:
        description: 'HF revision for Qwen3.5-4B GGUF (default: main)'
        required: false
        type: string
        default: main
      longmemeval_per_type:
        description: 'oracle: questions per type (1 = 6 fast, 2 = 12, 5 = 30 full default)'
        required: false
        type: string
        # 実機 oracle smoke #3 で 1 問あたり ~5.5min と判明。30 問は
        # 120min timeout に間に合わない。default を 1 (6 問、~33min)
        # に下げて反復実行を可能にし、本番品質評価をしたい時に手動で
        # 5 を指定する運用に変更。
        default: '1'
      ruler_seq_lengths:
        description: 'smoke (RULER NIAH-S): seq_lengths CSV (default 2048,4096,8192,12288 for 16K ctx)'
        required: false
        type: string
        default: '2048,4096,8192,12288'

permissions:
  contents: read

jobs:
  bench:
    name: 'bench (${{ inputs.suite }})'
    runs-on: ubuntu-latest
    # Qwen 4B Q4_K_M @ 4 vCPU で oracle 30 問は 60min を超える実測
    # (実機 smoke #2 で 58min 経過後 cancel)。oracle / all suite で
    # マージンを確保するため 120min。health smoke は数分で済むので
    # 共通 120min でも実害なし。
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Cache Hugging Face hub
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-bench-v1-qwen-${{ inputs.qwen_revision }}-${{ hashFiles('benches/scripts/download_models.sh') }}

      - name: Install llama.cpp release
        env:
          LLAMA_CPP_TAG: ${{ inputs.llama_cpp_tag }}
          # api.github.com の anonymous rate-limit (60/h) を回避するため
          # token を渡す。read-only で十分なので default の GITHUB_TOKEN
          # で OK。
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./benches/scripts/install_llama_cpp.sh

      - name: Download models (Qwen3.5-4B GGUF + multilingual-e5-small)
        env:
          QWEN_REVISION: ${{ inputs.qwen_revision }}
        run: ./benches/scripts/download_models.sh

      - name: Download datasets (LongMemEval oracle + MemoryAgentBench CR)
        if: inputs.suite == 'oracle' || inputs.suite == 'cr' || inputs.suite == 'all'
        # script 1 本で両 dataset を取る。LongMemEval ~15 MB + CR ~1.5 MB
        # で download cost は無視可能、suite 別の条件分岐は workflow 側で行う。
        run: ./benches/scripts/download_datasets.sh

      - name: Build runner with network feature
        run: cargo build --release -p tsumugi-bench --features network

      - name: Start llama-server
        run: nohup ./benches/scripts/start_llama_server.sh > llama-server.log 2>&1 &

      - name: Wait for llama-server health
        # 4 vCPU CPU で Qwen 4B Q4_K_M のモデルロード + KV cache init は
        # 300s で足りない可能性があるため 600s。実機 smoke の実測値で再調整。
        run: ./benches/scripts/wait_for_health.sh http://localhost:8080/health 600

      - name: Diagnose llama-server on failure
        if: failure()
        # health timeout / health-step 失敗時に llama-server.log と
        # process / port 状態を workflow output に出して原因切り分けを
        # artifact 取得なしでできるようにする。
        run: |
          echo "=== llama-server.log (full) ==="
          cat llama-server.log 2>&1 || echo "(log file missing)"
          echo
          echo "=== llama-server / qwen processes ==="
          ps -ef | grep -E "llama-server|qwen|gguf" | grep -v grep || echo "(no llama-server process)"
          echo
          echo "=== port 8080 listeners ==="
          ss -tlnp 2>/dev/null | grep ':8080' || echo "(port 8080 not listening)"
          echo
          echo "=== /tmp / disk usage ==="
          df -h /tmp / 2>/dev/null || true

      - name: Run bench
        env:
          # Step 2 の oracle adapter は LONGMEMEVAL_PATH を読む。
          # download_datasets.sh が `benches/data/longmemeval_oracle` に
          # symlink を張っている。
          LONGMEMEVAL_PATH: ${{ github.workspace }}/benches/data/longmemeval_oracle
          # oracle のサンプル数 (per_type)。default 5 = 30 問、CI で
          # timeout に当たりそうなら 2 = 12 問に下げる等。
          LONGMEMEVAL_PER_TYPE: ${{ inputs.longmemeval_per_type }}
          # Step 3 の smoke (RULER NIAH-S) は seq_lengths を env で受ける。
          # llama-server `--ctx-size 16384` に収まる範囲で指定すること。
          RULER_SEQ_LENGTHS: ${{ inputs.ruler_seq_lengths }}
          # Step 3 PR ② の cr (MemoryAgentBench Conflict_Resolution)。
          # adapter は MAB_CR_PATH を読む。download_datasets.sh が
          # parquet → JSONL 変換した結果がここに置かれる。
          MAB_CR_PATH: ${{ github.workspace }}/benches/data/memoryagentbench_cr.jsonl
        run: |
          ./target/release/tsumugi-bench \
            --suite ${{ inputs.suite }} \
            --output benches/results/${{ github.run_id }} \
            --llm-base-url http://localhost:8080/v1 \
            --llm-model Qwen3.5-4B-Instruct

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ inputs.suite }}-${{ github.run_id }}
          path: |
            benches/results/
            llama-server.log
          retention-days: 30
